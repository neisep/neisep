<svg width="100%" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes flicker {
      0% { opacity: 0.9; }
      5% { opacity: 0.4; }
      10% { opacity: 1; }
      15% { opacity: 0.5; }
      20% { opacity: 0.9; }
      100% { opacity: 1; }
    }

    .terminal {
      fill: #0aff9d;
      font-family: "Fira Code", monospace;
      font-size: 22px;
      animation: flicker 3s infinite;
    }

    .frame {
      stroke: #0aff9d;
      stroke-width: 3;
      fill: rgba(0, 0, 0, 0.6);
    }
  </style>

  <rect x="5" y="5" width="890" height="190" rx="8" class="frame" />

  <text x="25" y="60" class="terminal">&gt; booting NeiSepOS v2.6...</text>
  <text x="25" y="95" class="terminal">[ OK ] Loading native modules...</text>
  <text x="25" y="130" class="terminal">[ OK ] Initializing cyberpunk interface...</text>
  <text x="25" y="165" class="terminal">System online. Welcome, Operator.</text>
</svg>
