<svg width="100%" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes flicker {
      0% { opacity: 0.9; }
      5% { opacity: 0.4; }
      10% { opacity: 1; }
      15% { opacity: 0.5; }
      20% { opacity: 0.9; }
      100% { opacity: 1; }
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .frame {
      stroke: #0aff9d;
      stroke-width: 3;
      fill: rgba(0, 0, 0, 0.6);
    }

    .crt {
      fill: #0aff9d;
      font-family: "Fira Code", monospace;
      font-size: 26px;
      animation: flicker 3s infinite;
    }

    .char {
      opacity: 0;
      animation: type 0.9s forwards;
    }

    @keyframes type {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* staggered typing */
    .c0  { animation-delay: 0.00s; }
    .c1  { animation-delay: 0.08s; }
    .c2  { animation-delay: 0.16s; }
    .c3  { animation-delay: 0.24s; }
    .c4  { animation-delay: 0.32s; }
    .c5  { animation-delay: 0.40s; }
    .c6  { animation-delay: 0.48s; }
    .c7  { animation-delay: 0.56s; }
    .c8  { animation-delay: 0.64s; }
    .c9  { animation-delay: 0.72s; }
    .c10 { animation-delay: 0.80s; }
    .c11 { animation-delay: 0.88s; }
    .c12 { animation-delay: 0.96s; }
    .c13 { animation-delay: 1.04s; }
    .c14 { animation-delay: 1.12s; }
    .c15 { animation-delay: 1.20s; }
    .c16 { animation-delay: 1.28s; }
    .c17 { animation-delay: 1.36s; }
    .c18 { animation-delay: 1.44s; }
    .c19 { animation-delay: 1.52s; }
    .c20 { animation-delay: 1.60s; }

    .cursor {
      fill: #0aff9d;
      animation: blink 0.7s step-end infinite;
    }
  </style>

  <rect x="5" y="5" width="890" height="190" rx="8" class="frame" />

  <!-- typing line -->
  <text x="25" y="80" class="crt">
    <!-- "> booting NeiSepOS v2.6..." -->
    <tspan class="char c0">&gt;</tspan>
    <tspan class="char c1"> </tspan>
    <tspan class="char c2">b</tspan>
    <tspan class="char c3">o</tspan>
    <tspan class="char c4">o</tspan>
    <tspan class="char c5">t</tspan>
    <tspan class="char c6">i</tspan>
    <tspan class="char c7">n</tspan>
    <tspan class="char c8">g</tspan>
    <tspan class="char c9"> </tspan>
    <tspan class="char c10">J</tspan>
    <tspan class="char c11">i</tspan>
    <tspan class="char c12">m</tspan>
    <tspan class="char c13">m</tspan>
    <tspan class="char c14">i</tspan>
    <tspan class="char c15">e</tspan>
    <tspan class="char c16">O</tspan>
    <tspan class="char c17">S</tspan>
    <tspan class="char c18"> </tspan>
    <tspan class="char c19">v</tspan>
    <tspan class="char c20">2</tspan>
    <tspan class="char c21">.</tspan>
    <tspan class="char c22">6</tspan>
    <tspan class="char c23">.</tspan>
  </text>

  <!-- blinking cursor at end -->
  <rect x="430" y="60" width="14" height="26" class="cursor" />
</svg>
