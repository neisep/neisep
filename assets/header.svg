<svg width="100%" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes flicker {
      0% { opacity: 0.9; }
      5% { opacity: 0.4; }
      10% { opacity: 1; }
      15% { opacity: 0.5; }
      20% { opacity: 0.9; }
      100% { opacity: 1; }
    }

    .crt {
      fill: #0aff9d;
      font-family: "Fira Code", monospace;
      font-size: 22px;
      animation: flicker 3s infinite;
    }

    .frame {
      stroke: #0aff9d;
      stroke-width: 3;
      fill: rgba(0, 0, 0, 0.6);
    }
  </style>

  <rect x="5" y="5" width="890" height="250" rx="8" class="frame" />

  <text x="25" y="60" class="crt">&gt; system.describe()</text>
  <text x="25" y="100" class="crt">Name: Jimmie</text>
  <text x="25" y="135" class="crt">Role: Attestation Engine / Toolsmith</text>
  <text x="25" y="170" class="crt">Stack: Rust, Linux, Native UI, AI workflows</text>
  <text x="25" y="205" class="crt">Philosophy: Fast. Clean. No bloat. No noise.</text>
</svg>
