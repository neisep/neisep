<svg width="100%" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .window-bg { fill: #0a0f18; }
      .titlebar { fill: #111827; }
      .btn-red { fill: #ef4444; }
      .btn-yellow { fill: #f59e0b; }
      .btn-green { fill: #22c55e; }
      .text {
        font-family: "Fira Mono", monospace;
        font-size: 16px;
        fill: #e5e7eb;
      }
      .cmd { fill: #38bdf8; }
      .cursor {
        fill: #e5e7eb;
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Window frame -->
  <rect x="0" y="0" width="900" height="260" rx="12" class="window-bg"/>
  <rect x="0" y="0" width="900" height="38" rx="12" class="titlebar"/>

  <!-- Traffic lights -->
  <circle cx="26" cy="19" r="7" class="btn-red"/>
  <circle cx="50" cy="19" r="7" class="btn-yellow"/>
  <circle cx="74" cy="19" r="7" class="btn-green"/>

  <!-- Terminal content -->
  <text x="30" y="75" class="text">
    <tspan class="cmd">$ whoami</tspan>
  </text>

  <text x="30" y="105" class="text">
    <tspan>
      NeiSep — systems developer, Rust enjoyer, Golang and C#
    </tspan>
  </text>

  <text x="30" y="145" class="text">
    <tspan class="cmd">$ focus --list</tspan>
  </text>

  <!-- Animated typing -->
  <text x="30" y="175" class="text">
    <tspan>
      Building fast native dev tools, Git/REST clients, and ai workflows.
    </tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="30" y="190" width="12" height="20" class="cursor"/>
</svg>
